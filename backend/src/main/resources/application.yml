spring:
  application:
    name: product-shot-ai-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/product_shot_ai}
    username: ${SPRING_DATASOURCE_USERNAME:product_shot_ai}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
  ai:
    openai-api-key: ${OPENAI_API_KEY:}
