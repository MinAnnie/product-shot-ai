spring:
  application:
    name: product-shot-ai-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/product_shot_ai}
    username: ${SPRING_DATASOURCE_USERNAME:product_shot_ai}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
  ai:
    provider: ${IMAGE_PROVIDER:fal}
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
    fal:
      api-key: ${FAL_KEY:}
      base-url: ${FAL_BASE_URL:https://fal.run}
      endpoint-id: ${FAL_ENDPOINT_ID:fal-ai/flux-pro/kontext}
      output-format: ${FAL_OUTPUT_FORMAT:jpeg}
      aspect-ratio: ${FAL_ASPECT_RATIO:1:1}
      safety-tolerance: ${FAL_SAFETY_TOLERANCE:2}
      enhance-prompt: ${FAL_ENHANCE_PROMPT:true}
      guidance-scale: ${FAL_GUIDANCE_SCALE:3.5}
      num-images: ${FAL_NUM_IMAGES:1}
