services:
  db:
    image: postgres:16-alpine
    container_name: product-shot-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-product_shot_ai}
      POSTGRES_USER: ${POSTGRES_USER:-product_shot_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - product_shot_ai_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-product_shot_ai} -d ${POSTGRES_DB:-product_shot_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: product-shot-ai-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-product_shot_ai}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-product_shot_ai}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-fal}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8080}
      FAL_KEY: ${FAL_KEY:-}
      FAL_BASE_URL: ${FAL_BASE_URL:-https://fal.run}
      FAL_ENDPOINT_ID: ${FAL_ENDPOINT_ID:-fal-ai/flux-pro/kontext}
      FAL_OUTPUT_FORMAT: ${FAL_OUTPUT_FORMAT:-jpeg}
      FAL_ASPECT_RATIO: ${FAL_ASPECT_RATIO:-1:1}
      FAL_SAFETY_TOLERANCE: ${FAL_SAFETY_TOLERANCE:-2}
      FAL_ENHANCE_PROMPT: ${FAL_ENHANCE_PROMPT:-true}
      FAL_GUIDANCE_SCALE: ${FAL_GUIDANCE_SCALE:-3.5}
      FAL_NUM_IMAGES: ${FAL_NUM_IMAGES:-1}
    ports:
      - "8080:8080"
    volumes:
      - product_shot_ai_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: product-shot-ai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: ${API_URL:-http://localhost:8080}
    ports:
      - "80:80"

volumes:
  product_shot_ai_db_data:
  product_shot_ai_uploads:
